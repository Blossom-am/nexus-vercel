<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Dashboard</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-content {
      text-align: center;
      color: white;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top: 4px solid white;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error-box {
      background-color: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 16px;
      margin: 16px 0;
      color: #991b1b;
      font-family: monospace;
      font-size: 12px;
      overflow-x: auto;
      max-height: 200px;
      overflow-y: auto;
    }

    /* ─── Mobile responsive ─── */
    @media (max-width: 767px) {
      .nexus-sidebar-desktop { display: none !important; }
      .nexus-mobile-header { display: flex !important; }
      .nexus-main { margin-left: 0 !important; }
      .nexus-main-padding { padding: 12px !important; }
      .nexus-grid-responsive { grid-template-columns: 1fr !important; }
      .nexus-grid-2col { grid-template-columns: 1fr 1fr !important; }
      .nexus-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .nexus-table-wrap table { min-width: 600px; }
      .nexus-form-stack > div { margin-bottom: 12px; }
      .nexus-hide-mobile { display: none !important; }
      .nexus-text-sm-mobile { font-size: 0.75rem !important; }
      h2 { font-size: 1.25rem !important; }
      .nexus-card-mobile { padding: 12px !important; }
      .nexus-btn-mobile { padding: 12px 16px !important; font-size: 14px !important; min-height: 44px; }
      select, input[type="text"], input[type="password"], input[type="date"] {
        font-size: 16px !important; /* Prevents zoom on iOS */
        min-height: 44px;
      }
      button { min-height: 44px; }
      .nexus-mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
      .nexus-mobile-sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; width: 280px; }
    }
    @media (min-width: 768px) {
      .nexus-sidebar-desktop { display: block !important; }
      .nexus-mobile-header { display: none !important; }
      .nexus-main { margin-left: 256px !important; }
    }
  </style>
</head>

    // Error Boundary Component
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('Error caught by boundary:', error, errorInfo);
        window.errorLog.push({ component: 'ErrorBoundary', error: String(error), info: errorInfo });
      }

      render() {
        if (this.state.hasError) {
          return h("div", { className: "bg-red-50 border border-red-200 rounded-lg p-6 my-4" },
            h("h3", { className: "text-red-900 font-semibold mb-2" }, "Erreur de composant"),
            h("p", { className: "text-red-800 mb-2" }, this.state.error?.message || 'Une erreur est survenue'),
            h("pre", { className: "bg-red-100 p-3 rounded text-xs text-red-900 overflow-x-auto" },
              this.state.error?.stack || 'Pas de details'
            )
          );
        }
        return this.props.children;
      }
    }

    // Pure CSS Donut Chart (no external library)
    const PieChartFallback = ({ data, title }) => {
      const total = data.reduce((s, d) => s + d.value, 0);
      if (total === 0) return h("div", { className: "text-gray-400 text-sm" }, "Pas de données");
      // Build conic-gradient segments
      let cumPct = 0;
      const segments = data.map((d, i) => {
        const pct = (d.value / total) * 100;
        const start = cumPct;
        cumPct += pct;
        return CHART_COLORS[i % CHART_COLORS.length] + " " + start.toFixed(2) + "% " + cumPct.toFixed(2) + "%";
      });
      const gradient = "conic-gradient(" + segments.join(", ") + ")";
      return h("div", { className: "flex flex-col items-center" },
        h("div", { style: { width: 180, height: 180, borderRadius: "50%", background: gradient, position: "relative", margin: "0 auto" } },
          h("div", { style: { position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", width: 80, height: 80, borderRadius: "50%", background: "white" } })
        ),
        h("div", { className: "mt-3 space-y-1 w-full" },
          data.map((d, i) =>
            h("div", { key: i, className: "flex items-center gap-2 text-xs" },
              h("span", { style: { display: "inline-block", width: 10, height: 10, borderRadius: 2, backgroundColor: CHART_COLORS[i % CHART_COLORS.length], flexShrink: 0 } }),
              h("span", { className: "truncate" }, d.name),
              h("span", { className: "ml-auto font-semibold" }, d.value + " (" + ((d.value / total) * 100).toFixed(1) + "%)")
            )
          )
        )
      );
    };

    const BarChartFallback = ({ data, xKey, yKey, title }) => {
      if (!data || data.length === 0) return h("div", { className: "text-gray-400 text-sm" }, "Pas de données");
      const maxVal = Math.max(...data.map(d => d[yKey] || 0));
      if (maxVal === 0) return h("div", { className: "text-gray-400 text-sm" }, "Pas de données");
      return h("div", { className: "space-y-2" },
        data.slice(0, 15).map((d, i) => {
          const pct = maxVal > 0 ? ((d[yKey] / maxVal) * 100) : 0;
          const isEuro = d[yKey] > 1000;
          const label = isEuro ? fmtE(d[yKey]) : d[yKey];
          return h("div", { key: i, className: "flex items-center gap-2 text-xs" },
            h("span", { className: "w-24 truncate text-right text-gray-600", title: d[xKey] }, d[xKey]),
            h("div", { className: "flex-1 bg-gray-100 rounded-full h-5 relative overflow-hidden" },

              h("span", { style: { position: "absolute", right: 6, top: 2, fontSize: 10, fontWeight: 600, color: pct > 40 ? "white" : "#374151" } }, label)

          );

      return Object.assign({}, BUILTIN_AGENT_IMM);
    }
    function saveAgentImmData(data) {
      try { localStorage.setItem(AGENT_IMM_LS_KEY, JSON.stringify(data)); } catch(e) {}
      pushData(["agentImm"]);
    }

      try { var raw = localStorage.getItem(AGENT_TYPE_LS_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
      return Object.assign({}, BUILTIN_AGENT_TYPES);
    }
    function saveAgentTypes(data) {
      try { localStorage.setItem(AGENT_TYPE_LS_KEY, JSON.stringify(data)); } catch(e) {}
      pushData(["agentTypes"]);
    }
    function getAgentType(agentName) {
      var types = getAgentTypes();
      return types[agentName] || "";
    }

        var acc = users.find(function(u) { return u.role === "agent" && u.agentName === selectedAgent; });
        if (acc) { setEditUsername(acc.username || ""); setEditPassword(acc.password || ""); }
        else { setEditUsername(""); setEditPassword(""); }
        setEditCredMsg("");

      function saveAgentCredentials() {
        if (!selectedAgent || !editUsername) { setEditCredMsg("Identifiant requis"); return; }
        var users = getUsers();

        if (acc) { acc.username = editUsername; acc.password = editPassword; saveUsers(users); pushData(); setEditCredMsg("Identifiants sauvegard\u00e9s !"); }
        else { setEditCredMsg("Aucun compte trouv\u00e9 pour cet agent"); }

        setSyncMsg("Paramètres copiés ! Collez-les dans Cowork pour synchroniser.");

      var allAgents = useMemo(function() {
        var base = TRACKER_AGENTS.map(function(a) { return a.n; });
        customAgents.forEach(function(ca) { if (base.indexOf(ca) === -1) base.push(ca); });
        Object.keys(data).forEach(function(a) { if (base.indexOf(a) === -1) base.push(a); });
        return base.sort();
      }, [customAgents, data]);

      // All immeubles - use unique key "assetIdCdc_ville" and compute display label
      function getImmLabel(key) {
        var b = BUILDINGS_LIST.find(function(bl) { return bl.assetIdCdc + "_" + bl.ville === key; });
        if (!b) return key;
        var m = BUILDING_META[b.assetIdCdc + "_" + b.ville] || BUILDING_META[b.ville];
        return m && m.address ? b.ville + " — " + m.address.split(",")[0] : b.ville;
      }
      var allImmeubles = useMemo(function() {
        return BUILDINGS_LIST.map(function(b) { return b.assetIdCdc + "_" + b.ville; }).sort(function(a, b) { return getImmLabel(a).localeCompare(getImmLabel(b)); });
      }, []);

      // Add custom agent
      function addCustomAgent(name) {
        if (name && customAgents.indexOf(name) === -1 && allAgents.indexOf(name) === -1) {
          setCustomAgents(function(prev) { return prev.concat([name]); });

        setSelectedAgent(name);

          if (!copy[agent]) copy[agent] = [];
          if (copy[agent].indexOf(imm) === -1) copy[agent] = copy[agent].concat([imm]);
          return copy;

          if (copy[agent]) {

                  h("div", { className: "relative", style: { height: "28px" } },
                    h("div", { style: { position: "absolute", top: "0", left: "0", width: (d.bp / maxQuarterVal * 100) + "%", height: "12px", backgroundColor: "#3b82f6", borderRadius: "3px" } }),
                    d.actual > 0 ? h("div", { style: { position: "absolute", top: "14px", left: "0", width: (d.actual / maxQuarterVal * 100) + "%", height: "12px", backgroundColor: "#22c55e", borderRadius: "3px" } }) : null
                  )
                );
              })
            )
          ),

        // Cumulative chart (adapts to view mode)
        h("div", { className: "bg-white p-6 rounded-lg shadow" },
          h("h2", { className: "text-xl font-semibold mb-2 text-gray-800" }, viewMode === "quarterly" ? "CA cumul\u00e9 trimestriel \u2014 BP vs R\u00e9alis\u00e9" : "CA cumul\u00e9 annuel \u2014 BP vs R\u00e9alis\u00e9"),
          h("div", { className: "flex items-center gap-6 mb-4" },
            h("div", { className: "flex items-center gap-2" },
              h("div", { style: { width: "16px", height: "16px", backgroundColor: "#3b82f6", borderRadius: "3px" } }),
              h("span", { className: "text-sm text-gray-600" }, "BP cumul\u00e9")
            ),
            h("div", { className: "flex items-center gap-2" },
              h("div", { style: { width: "16px", height: "16px", backgroundColor: "#22c55e", borderRadius: "3px" } }),
              h("span", { className: "text-sm text-gray-600" }, "R\u00e9alis\u00e9")
            )
          ),
          h("div", { className: "space-y-2" },
            cumData.map(function(d) {
              return h("div", { key: d.label + "-cum", className: "space-y-1" },
                h("div", { className: "flex justify-between text-sm" },
                  h("span", { className: "font-medium text-gray-700 w-20" }, d.label),
                  h("span", { className: "text-gray-500" }, fmtE(d.bpCum) + " (BP) / " + fmtE(d.actualCum) + " (R\u00e9el)")
                ),
                h("div", { className: "relative", style: { height: "28px" } },
                  h("div", { style: { position: "absolute", top: "0", left: "0", width: (d.bpCum / maxCumVal * 100) + "%", height: "12px", backgroundColor: "#3b82f6", borderRadius: "3px" } }),
                  h("div", { style: { position: "absolute", top: "14px", left: "0", width: (d.actualCum / maxCumVal * 100) + "%", height: "12px", backgroundColor: "#22c55e", borderRadius: "3px" } })
                )
              );
            })
          )
        ),

        // Per-building table (adapts to view mode)
        h("div", { className: "bg-white p-6 rounded-lg shadow" },
          h("h2", { className: "text-xl font-semibold mb-4 text-gray-800" }, viewMode === "quarterly" ? "D\u00e9tail par immeuble (trimestriel)" : "D\u00e9tail par immeuble"),
          viewMode === "quarterly" && !selectedYear ? h("p", { className: "text-sm text-gray-500 mb-3" }, "S\u00e9lectionnez une ann\u00e9e ci-dessus pour filtrer les trimestres dans le tableau.") : null,
          h("div", { className: "overflow-x-auto" },
            h("table", { className: "w-full border-collapse text-sm" },
              h("thead", {},
                h("tr", { className: "bg-gray-100 border-b" },
                  h("th", { className: "px-3 py-2 text-left font-semibold text-gray-700 sticky left-0 bg-gray-100 z-10" }, "Immeuble"),
                  viewMode === "annual" ?
                    BP_YEARS.map(function(y) { return h("th", { key: y, className: "px-3 py-2 text-right font-semibold text-gray-700 whitespace-nowrap" }, y); })
                  :
                    tableQLabels.map(function(l) { return h("th", { key: l, className: "px-2 py-2 text-right font-semibold text-gray-700 whitespace-nowrap text-xs" }, l); }),
                  h("th", { className: "px-3 py-2 text-right font-semibold text-gray-700" }, "Total BP"),
                  h("th", { className: "px-3 py-2 text-right font-semibold text-gray-700" }, "R\u00e9alis\u00e9"),
                  h("th", { className: "px-3 py-2 text-right font-semibold text-gray-700" }, "%"),
                  h("th", { className: "px-3 py-2 text-right font-semibold text-gray-700" }, "\u00c9cart")
                )
              ),
              h("tbody", {},
                tableData.map(function(b) {
                  return h("tr", { key: b.id, className: "border-b hover:bg-gray-50" },
                    h("td", { className: "px-3 py-2 text-gray-800 font-medium whitespace-nowrap sticky left-0 bg-white z-10" }, b.name),
                    viewMode === "annual" ?
                      b.ann.map(function(v, yi) { return h("td", { key: yi, className: "px-3 py-2 text-right " + (v > 0 ? "text-gray-600" : "text-gray-300") }, v > 0 ? fmtE(v) : "\u2014"); })
                    :
                      tableQIndices.map(function(qi) {
                        var v = b.q[qi] || 0;
                        return h("td", { key: qi, className: "px-2 py-2 text-right text-xs " + (v > 0 ? "text-gray-600" : "text-gray-300") }, v > 0 ? fmtE(v) : "\u2014");
                      }),
                    h("td", { className: "px-3 py-2 text-right text-gray-700 font-medium" }, fmtE(b.caTotal)),
                    h("td", { className: "px-3 py-2 text-right " + (b.actual > 0 ? "text-green-600 font-semibold" : "text-gray-400") }, b.actual > 0 ? fmtE(b.actual) : "\u2014"),
                    h("td", { className: "px-3 py-2 text-right font-semibold " + (b.pct >= 10 ? "text-green-600" : b.pct > 0 ? "text-orange-500" : "text-gray-400") }, b.pct + "%"),
                    h("td", { className: "px-3 py-2 text-right text-red-500" }, b.caTotal > 0 ? "-" + fmtE(b.caTotal - b.actual) : "\u2014")
                  );
                }),
                // Totals row
                h("tr", { className: "bg-gray-100 font-bold border-t-2" },
                  h("td", { className: "px-3 py-2 text-gray-800 sticky left-0 bg-gray-100 z-10" }, "TOTAL"),
                  viewMode === "annual" ?
                    BP_CONSO_ANNUAL.map(function(v, yi) { return h("td", { key: yi, className: "px-3 py-2 text-right text-gray-800" }, fmtE(v)); })
                  :
                    tableQIndices.map(function(qi) {
                      var v = BP_CONSO_QUARTERLY[qi] || 0;
                      return h("td", { key: qi, className: "px-2 py-2 text-right text-xs text-gray-800" }, v > 0 ? fmtE(v) : "\u2014");
                    }),
                  h("td", { className: "px-3 py-2 text-right text-gray-800" }, fmtE(BP_TOTAL_REVENUE)),
                  h("td", { className: "px-3 py-2 text-right text-green-600" }, fmtE(ACTUAL_TOTAL_REVENUE)),
                  h("td", { className: "px-3 py-2 text-right text-gray-800" }, pctAchieved + "%"),
                  h("td", { className: "px-3 py-2 text-right text-red-500" }, "-" + fmtE(BP_TOTAL_REVENUE - ACTUAL_TOTAL_REVENUE))
                )
              )
            )
          )
        )
      );
    };

    // Main App
    const App = () => {
      const [user, setUser] = useState(function() {
        try { var raw = sessionStorage.getItem("nexus_session"); if (!raw) return null; var u = JSON.parse(raw); if (!u.name && (u.fullName || u.username)) { u.name = u.fullName || u.username; } return u; } catch(e) { return null; }
      });
      // Persist user session so sync-reload doesn't log out
      useEffect(function() {
        try {
          if (user) { sessionStorage.setItem("nexus_session", JSON.stringify(user)); }
          else { sessionStorage.removeItem("nexus_session"); }
        } catch(e) {}
      }, [user]);
      const [currentPage, _setCurrentPage] = useState(function() {
        try { return sessionStorage.getItem("nexus_page") || "dashboard"; } catch(e) { return "dashboard"; }
      });
      function setCurrentPage(p) { _setCurrentPage(p); try { sessionStorage.setItem("nexus_page", p); } catch(e) {} }
      const [selectedBuilding, setSelectedBuilding] = useState(null);
      const [selectedLot, setSelectedLot] = useState(null);
      const [customAgents, setCustomAgents] = useState(function() {
        try { var raw = localStorage.getItem("nexus_custom_agents"); return raw ? JSON.parse(raw) : []; } catch(e) { return []; }
      });
      useEffect(function() {
        try { localStorage.setItem("nexus_custom_agents", JSON.stringify(customAgents)); } catch(e) {}
      }, [customAgents]);

      var [mobileOpen, setMobileOpen] = useState(false);

      // Force agent users to denonce-visites page (must be before early return to respect hooks rules)
      useEffect(function() {
        if (user && user.role === "agent" && currentPage !== "denonce-visites" && currentPage !== "lots" && currentPage !== "lot-detail") {
          setCurrentPage("denonce-visites");
        }
      }, [user, currentPage]);

      if (!user) {
        return h(LoginPage, { setUser });
      }

      return h("div", { className: "flex min-h-screen" },
        h(Sidebar, { currentPage, setCurrentPage, user, setUser, mobileOpen, setMobileOpen }),
        h("div", { className: "flex-1 nexus-main" },
          h("div", { className: "nexus-mobile-header sticky top-0 z-20 bg-blue-900 text-white px-4 py-3 items-center justify-between shadow", style: { display: "none" } },
            h("button", { onClick: function() { setMobileOpen(true); }, className: "text-2xl leading-none" }, "\u2630"),
            h("h1", { className: "text-lg font-bold" }, "Nexus"),
            h("div", { className: "w-8" })
          ),
          h("div", { className: "p-8 nexus-main-padding" },
          currentPage === "dashboard" && h(DashboardPage, {}),
          currentPage === "buildings" && h(BuildingsPage, { setCurrentPage, setSelectedBuilding }),
          currentPage === "building-detail" && h(BuildingDetailPage, { building: selectedBuilding, setCurrentPage, setSelectedLot }),
          currentPage === "lots" && h(LotsPage, { setCurrentPage, setSelectedLot, user }),
          currentPage === "lot-detail" && h(LotDetailPage, { lot: selectedLot, setCurrentPage, user }),
          currentPage === "visits-indicateurs" && h(VisitesIndicateursPage, { setCurrentPage, setSelectedLot, customAgents }),
          currentPage === "denonce-visites" && h(DenonceVisitesPage, { setCurrentPage, setSelectedLot, customAgents, setCustomAgents, user }),
          currentPage === "agent-immeubles" && h(AgentImmeublesPage, { customAgents, setCustomAgents }),
          currentPage === "actions" && h(ActionsPage, { setCurrentPage, setSelectedLot }),
          currentPage === "comments" && h(CommentsPage, { setCurrentPage, setSelectedLot }),
          currentPage === "bp-progress" && h(AvancementBPPage, {})
          )
        ),
        null // Sync is automatic via Vercel API
      );
    };

    // Initial sync on load + start periodic sync
    // Pull data BEFORE rendering React, then render
    initialSync().then(function(ok) {
      if (ok) console.log("Sync OK");
    }).finally(function() {
      // Start periodic sync for receiving updates from other terminals
      startPeriodicSync();
      // Initialize and Render AFTER sync is complete
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        h(ErrorBoundary, {},
          h(App)
        )
      );
      // Hide loading screen
      setTimeout(function() {
        var ls = document.getElementById("loading-screen");
        if (ls) ls.style.display = "none";
      }, 500);
    });

    } catch (err) {
      console.error("Fatal error during app initialization:", err);
      var rootEl = document.getElementById("root");
      if (rootEl) {
        rootEl.innerHTML = '<div style="padding:40px;font-family:sans-serif;">' +
          '<h1 style="color:#dc2626;font-size:24px;margin-bottom:16px;">Erreur d\'initialisation</h1>' +
          '<pre style="background:#fee2e2;padding:16px;border-radius:8px;font-size:12px;overflow:auto;white-space:pre-wrap;">' + err.message + '\n\n' + err.stack + '</pre>' +
          '<p style="color:#6b7280;margin-top:16px;">Veuillez recharger la page.</p></div>';
      }
    } finally {
      var ls2 = document.getElementById("loading-screen");
      if (ls2) ls2.style.display = "none";
    }
  </script>
</body>
</html>
